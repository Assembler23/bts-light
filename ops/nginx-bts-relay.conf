# nginx-Konfiguration fuer den bts-relay-Cloud-Relay.
#
# Der Relay laeuft lokal auf 127.0.0.1:8090; nginx terminiert TLS und
# leitet den Pfad /bts-relay/ dorthin weiter. Keine Subdomain, kein neues
# Zertifikat – der Pfad laeuft auf dem bestehenden badhub.de-Zertifikat.
#
# ── Schritt 1 ──────────────────────────────────────────────────────────
# Dieser map-Block gehoert EINMALIG in den http{}-Kontext, z. B. als
# /etc/nginx/conf.d/websocket-upgrade.conf. Falls badhub.de an anderer
# Stelle schon so eine map hat, diesen Block weglassen.
#
#   map $http_upgrade $connection_upgrade {
#       default upgrade;
#       ''      close;
#   }
#
# ── Schritt 2 ──────────────────────────────────────────────────────────
# Dieser location-Block gehoert in den server{}-Block von badhub.de
# (Port 443), neben die uebrigen location-Regeln:

location /bts-relay/ {
    # Trailing-Slash an proxy_pass: nginx ersetzt das Praefix /bts-relay/
    # durch /, der Relay sieht also /<namespace>/court/... usw.
    proxy_pass http://127.0.0.1:8090/;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSockets duerfen lange offen bleiben (ein Match dauert > 1 h).
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}
