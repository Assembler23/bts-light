<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Kombi-Anzeige</title>
<style>
/* Gleiche Palette wie monitor.html / overview.html: dunkles Marine,
   gelbe Akzente. Mehrere Felder als horizontale Bänder übereinander —
   jedes Band flex:1, teilt sich die Höhe gleichmäßig (1 Feld = voll,
   3 Felder = je ein Drittel). */
html, body {
  margin: 0; height: 100%; width: 100%;
  background: #0b1120; color: #f8fafc;
  font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  cursor: none; overflow: hidden;
}
body.rotate-90  { transform: rotate(90deg);  transform-origin: 50vh 50vh; width: 100vh; height: 100vw; }
body.rotate-180 { transform: rotate(180deg); }
body.rotate-270 { transform: rotate(270deg); transform-origin: 50vh 50vh; width: 100vh; height: 100vw; }

#board {
  height: 100%; display: flex; flex-direction: column;
  gap: .6vh; padding: .6vh; box-sizing: border-box;
}

/* Ein Band = ein Feld. */
.band {
  flex: 1 1 0; min-height: 0;
  display: flex; flex-direction: column; justify-content: center;
  gap: 1vh;
  padding: 1.6vh 2.4vw;
  background: linear-gradient(180deg, #1a2842, #0f1a30);
  border: .25vmin solid #334155; border-radius: 1.6vmin;
  overflow: hidden;
}
.band.live   { border-color: #1f6f4a; }
.band.pause  { border-color: #b08400; }
.band.empty  { opacity: .5; }

/* Kopfzeile: Feldnummer + Disziplin links, Status rechts. */
.band__head {
  display: flex; align-items: baseline; gap: 1.6vw;
}
.band__field {
  /* Feldnummer als hervorgehobenes Badge — aus der Ferne sofort erkennbar:
     großer Schrift, dunkler Text auf gelbem Block. */
  font-size: 6vh; font-weight: 900; color: #0b1220;
  line-height: 1; font-variant-numeric: tabular-nums;
  white-space: nowrap;
  background: #fbbf24; border-radius: 1vh;
  padding: .3vh 1.4vw;
}
.band__disc {
  font-size: 2.6vh; font-weight: 700; color: #94a3b8;
  text-transform: uppercase; letter-spacing: .04em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.band__status {
  margin-left: auto; font-size: 2.6vh; font-weight: 800;
  letter-spacing: .05em; text-transform: uppercase;
  display: inline-flex; align-items: center; gap: .8vw;
  white-space: nowrap;
}
.band__status.live  { color: #34d399; }
.band__status.pause { color: #fbbf24; }
.band__status.free  { color: #64748b; }
.dot {
  width: 1.4vh; height: 1.4vh; border-radius: 50%;
  background: currentColor; box-shadow: 0 0 1.4vh currentColor;
}
.band__status.live .dot { animation: pulse 1.6s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .35 } }

/* Spieler-Zeilen: Name links (flex), Sätze rechts (tabellarisch). */
.row {
  display: flex; align-items: center; gap: 1.4vw;
}
/* Aufschlag-Indikator: gelber Punkt vor dem aufschlagenden Team. */
.serve-dot {
  flex: 0 0 auto; width: 1.8vh; height: 1.8vh; border-radius: 50%;
  background: #fbbf24; box-shadow: 0 0 1.4vh rgba(251,191,36,.7);
}
.serve-dot.hidden { visibility: hidden; }
.row__name {
  flex: 1 1 auto; min-width: 0;
  display: flex; flex-direction: column; justify-content: center; gap: .2vh;
}
.row__name .pname {
  /* --name-size wird per JS nach Feldzahl gesetzt (analog --set-size), damit
     die Namen die Bandhöhe nutzen statt winzig zu wirken. */
  font-size: var(--name-size, 4vh); font-weight: 700; color: #e2e8f0; line-height: 1.15;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  display: flex; align-items: center; gap: 1vw;
}
.row__name .pname .flag {
  /* Einheitliche Größe für alle Flaggen (manche Seitenverhältnisse sind
     breiter): feste Box + object-fit:cover, wie auf der Einzel-Ansicht. */
  flex: 0 0 auto; width: 4vh; height: 2.6vh; object-fit: cover;
  border-radius: .3vh; box-shadow: 0 0 .4vh rgba(0,0,0,.5);
}
.row__name .pname .flag.hidden { display: none; }
.row__name .pname .pname-text {
  overflow: hidden; text-overflow: ellipsis;
}
.row.winner .row__name .pname { color: #34d399; }
.row__sets {
  flex: 0 0 auto; display: flex; align-items: center; gap: 1.6vw;
  font-variant-numeric: tabular-nums;
}
/* Ergebnis-Zahlen so gross wie moeglich — Hauptinformation auf Distanz.
   --set-size wird per JS nach Feldzahl gesetzt (nutzt die Bandhoehe):
   1 Feld riesig, 3 Felder kleiner aber weiterhin gross lesbar. */
.set {
  min-width: 1.6ch; text-align: center;
  font-size: var(--set-size, 12vh); font-weight: 900; color: #64748b; line-height: 1;
}
.set.won { color: #f8fafc; }
/* Laufender Satz: nur farblich hervorgehoben (gelb), kein Unterstrich. */
.set.current {
  color: #fbbf24;
}

.idle {
  height: 100%; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 2vh;
  color: #94a3b8; text-align: center; padding: 6vmin;
}
.idle h1 { font-size: 5vmin; color: #fbbf24; margin: 0; }

#offline {
  position: fixed; top: 1vh; right: 2vw;
  background: rgba(244,63,94,.18); color: #fda4af;
  border: .2vmin solid #b91c1c; border-radius: 1vmin;
  padding: .5vh 1.4vw; font-size: 2.2vh; font-weight: 700;
  display: none;
}
#offline.show { display: block; }
/* ─── Identifizieren-Overlay (Fernbefehl) — wie monitor.html ─────────── */
#identify-overlay {
  position: fixed; inset: 0; display: none; z-index: 100;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 2vh; background: #fbbf24; color: #1a1206;
  animation: identify-flash 1s ease-in-out infinite;
}
#identify-overlay.show { display: flex; }
@keyframes identify-flash { 0%, 100% { opacity: 1; } 50% { opacity: .65; } }
#identify-overlay .i-code {
  font-size: 26vmin; font-weight: 900; line-height: 1; letter-spacing: .08em;
}
#identify-overlay .i-court { font-size: 7vmin; font-weight: 800; }

/* ─── Vertikale Kombi (?dir=v): Felder NEBENEINANDER, je Feld Hochformat —
   Team 1 oben, Spielstand (Satz-Paare) mittig, Team 2 unten. So mappt ein
   TV zwischen zwei Feldern räumlich auf links/rechts. ─────────────────── */
body.vertical #board { flex-direction: row; }
body.vertical .band {
  justify-content: space-evenly; align-items: stretch; text-align: center;
  padding: 2vh 1.2vw; gap: 1.4vh;
}
body.vertical .band__head { justify-content: center; }
body.vertical .vnames {
  display: flex; flex-direction: column; align-items: center; gap: .5vh;
}
body.vertical .vnames .pname {
  justify-content: center; font-size: 5.6vh; font-weight: 700; color: #e2e8f0;
  line-height: 1.15; max-width: 100%; gap: 1.4vw;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
body.vertical .vnames .pname .flag {
  flex: 0 0 auto; width: 5.8vh; height: 3.8vh; object-fit: cover;
  border-radius: .3vh; box-shadow: 0 0 .4vh rgba(0,0,0,.5);
}
body.vertical .vnames .pname .flag.hidden { display: none; }
/* Aufschlag-Punkt im Vertikal-Modus deutlich größer (neben den großen
   Namen/Zahlen sonst kaum sichtbar). Erscheint beim aufschlagenden Spieler,
   sobald das Tablet die Aufschlag-Info meldet. */
body.vertical .vnames .serve-dot { width: 3vh; height: 3vh; }
body.vertical .vnames .pname .pname-text { overflow: hidden; text-overflow: ellipsis; }
/* Spielstand: je Team eine Zeile mit den Satzzahlen (groß), Team 1 oben,
   Team 2 darunter — zwischen den Namen. Mehrere Sätze = mehrere Zahlen
   nebeneinander je Zeile. */
body.vertical .vsetrow {
  display: flex; justify-content: center; gap: 3vw;
  font-variant-numeric: tabular-nums; line-height: 1;
}
body.vertical .vset { font-size: 15vh; font-weight: 900; color: #64748b; }
body.vertical .vset.won { color: #f8fafc; }
body.vertical .vset.current { color: #fbbf24; }
</style>
</head>
<body>
<main id="board"></main>
<div id="offline">Keine Verbindung zum Turnier-PC</div>
<div id="identify-overlay">
  <div class="i-code" id="identify-code">····</div>
  <div class="i-court" id="identify-court">Kombi</div>
</div>

<script>
(function () {
  'use strict';

  var params = new URLSearchParams(location.search);

  // Pivot-Rotation per URL-Parameter.
  var rotate = (params.get('rotate') || '0').replace(/[^0-9]/g, '');
  if (rotate === '90' || rotate === '180' || rotate === '270') {
    document.body.classList.add('rotate-' + rotate);
  }

  // Gewünschte CourtIDs (Reihenfolge wird beibehalten) + Geräte-Code.
  var courtsParam = (params.get('courts') || '').trim();
  var deviceId = (params.get('device') || '').trim();

  // ?dir=v → Felder NEBENEINANDER (Hochformat je Feld) statt übereinander.
  if (/^(v|vertical)$/i.test(params.get('dir') || '')) {
    document.body.classList.add('vertical');
  }

  var POLL_OK_MS = 1000;
  var POLL_FAIL_MS = 2000;
  var errorCount = 0;

  function h(tag, cls, text) {
    var el = document.createElement(tag);
    if (cls) el.className = cls;
    if (text != null) el.textContent = text;
    return el;
  }

  function setVal(s, idx) {
    // sets-Eintrag ist [a,b] (serde-Tuple) oder {a,b}. Fallback 0 statt
    // "undefined" in der Zelle, falls das Schema je abweicht.
    if (Array.isArray(s)) return s[idx] != null ? s[idx] : 0;
    return idx === 0
      ? (s.a != null ? s.a : (s[0] != null ? s[0] : 0))
      : (s.b != null ? s.b : (s[1] != null ? s[1] : 0));
  }

  function renderBand(c) {
    var isLive = c.match_id && c.match_id > 0 && c.team1 && c.team1.length > 0;
    var isPause = isLive && (c.injury || c.official_call);

    var band = h('div', 'band' + (!isLive ? ' empty' : isPause ? ' pause' : ' live'));

    // Kopfzeile
    var head = h('div', 'band__head');
    head.appendChild(h('span', 'band__field', c.court || ('Feld ' + c.court_id)));
    if (isLive) head.appendChild(h('span', 'band__disc', c.match_name || ''));
    // Status nur bei AbweichungEN vom Normalfall zeigen — „läuft" ist
    // redundant (sieht man am Spielstand) und kostet Platz. Frei/Pause/
    // TL/Behandlung bleiben sichtbar.
    if (!isLive) {
      var sFree = h('span', 'band__status free');
      sFree.appendChild(h('span', null, 'frei'));
      head.appendChild(sFree);
    } else if (c.injury) {
      var sInj = h('span', 'band__status pause');
      sInj.appendChild(h('span', null, 'Behandlung'));
      head.appendChild(sInj);
    } else if (c.official_call) {
      var sTl = h('span', 'band__status pause');
      sTl.appendChild(h('span', null, 'TL'));
      head.appendChild(sTl);
    }
    band.appendChild(head);

    if (!isLive) return band;

    // Sätze-Anzahl + Index des laufenden Satzes (letzter, solange live).
    var sets = Array.isArray(c.sets) ? c.sets : [];
    var lastIdx = sets.length - 1;
    var running = !isPause; // bei Pause kein "laufender" Satz markieren

    // Vertikaler Modus (?dir=v): Team 1 oben, Spielstand (Satz-Paare) mittig,
    // Team 2 unten — je Feld ein Hochformat-Scoreboard, Felder nebeneinander.
    if (document.body.classList.contains('vertical')) {
      var vname = function (names, nats, isServing, servePlayerIdx) {
        var box = h('div', 'vnames');
        var list = (names && names.length) ? names : ['—'];
        list.forEach(function (n, i) {
          var line = h('div', 'pname');
          var dotHere = isServing && (servePlayerIdx == null ? i === 0 : i === servePlayerIdx);
          line.appendChild(h('span', 'serve-dot' + (dotHere ? '' : ' hidden')));
          line.appendChild(flagEl(nats && nats[i]));
          line.appendChild(h('span', 'pname-text', n));
          box.appendChild(line);
        });
        return box;
      };
      // Satzzahlen-Zeile eines Teams (selfIdx 0/1), gleiche Gewinn-/Laufend-
      // Färbung wie der horizontale Modus.
      var vsetRow = function (selfIdx, otherIdx) {
        var row = h('div', 'vsetrow');
        sets.forEach(function (s, i) {
          var mine = setVal(s, selfIdx);
          var theirs = setVal(s, otherIdx);
          var cls = 'vset';
          if (i === lastIdx && running) cls += ' current';
          else if (mine > theirs) cls += ' won';
          row.appendChild(h('span', cls, String(mine)));
        });
        return row;
      };
      var spv = (typeof c.serving_player === 'number') ? c.serving_player : null;
      band.appendChild(vname(c.team1, c.team1_nationalities, c.serving_team === 1, spv));
      band.appendChild(vsetRow(0, 1)); // Team 1 Punkte (oben)
      band.appendChild(vsetRow(1, 0)); // Team 2 Punkte (darunter)
      band.appendChild(vname(c.team2, c.team2_nationalities, c.serving_team === 2, spv));
      return band;
    }

    function teamRow(names, nats, selfIdx, otherIdx, isServing, servePlayerIdx) {
      var row = h('div', 'row');
      // Namen: im Doppel jeder Spieler in einer eigenen Zeile untereinander,
      // jeweils mit Flagge + Aufschlag-Punkt beim konkret aufschlagenden
      // Spieler (BWF-Doppelregel). servePlayerIdx = Index im Team, der
      // aufschlägt; null → Team-Level-Fallback (Punkt beim ersten Namen).
      var nameBox = h('div', 'row__name');
      var list = (names && names.length) ? names : ['—'];
      list.forEach(function (n, i) {
        var line = h('div', 'pname');
        var dotHere = isServing &&
          (servePlayerIdx == null ? i === 0 : i === servePlayerIdx);
        line.appendChild(h('span', 'serve-dot' + (dotHere ? '' : ' hidden')));
        line.appendChild(flagEl(nats && nats[i]));
        line.appendChild(h('span', 'pname-text', n));
        nameBox.appendChild(line);
      });
      row.appendChild(nameBox);
      var setsEl = h('div', 'row__sets');
      sets.forEach(function (s, i) {
        var mine = setVal(s, selfIdx);
        var theirs = setVal(s, otherIdx);
        var cls = 'set';
        if (i === lastIdx && running) cls += ' current';
        else if (mine > theirs) cls += ' won';
        setsEl.appendChild(h('span', cls, String(mine)));
      });
      row.appendChild(setsEl);
      return row;
    }

    var sp = (typeof c.serving_player === 'number') ? c.serving_player : null;
    band.appendChild(teamRow(c.team1, c.team1_nationalities, 0, 1, c.serving_team === 1, sp));
    band.appendChild(teamRow(c.team2, c.team2_nationalities, 1, 0, c.serving_team === 2, sp));
    return band;
  }

  // Flaggen-IMG aus der IOC-3-Nationalität; unbekannt/leer → versteckt.
  function flagEl(nat) {
    var img = document.createElement('img');
    img.className = 'flag';
    var code = (nat || '').trim().toUpperCase();
    if (code) {
      img.src = '/flags/' + encodeURIComponent(code) + '.svg';
      img.onerror = function () { img.classList.add('hidden'); };
    } else {
      img.classList.add('hidden');
    }
    return img;
  }

  function render(data) {
    var board = document.getElementById('board');
    board.textContent = '';
    var courts = (data && Array.isArray(data.courts)) ? data.courts : [];
    if (courts.length === 0) {
      var idle = h('div', 'idle');
      idle.appendChild(h('h1', null, 'Kombi-Anzeige'));
      idle.appendChild(h('p', null, 'Keine Felder zugewiesen oder Felder nicht gefunden.'));
      board.appendChild(idle);
      return;
    }
    // Satz-Zahlen-Größe an die Bandzahl koppeln: je weniger Felder, desto
    // mehr Höhe pro Band → desto größer die Zahlen. Werte empirisch so
    // gewählt, dass die Zahlen die Bandhöhe gut ausfüllen, ohne über-
    // zulaufen (1 Feld ~ 30vh, 2 ~ 19vh, 3 ~ 13vh).
    var sizeByCount = { 1: "30vh", 2: "19vh", 3: "13vh" };
    // Namen analog zur Bandhöhe skalieren — sonst wirken sie neben den großen
    // Zahlen winzig (Feld-Test 2026-06-13). Werte so, dass auch Doppel (zwei
    // gestapelte Namen je Team) bei 3 Feldern nicht überlaufen.
    var nameByCount = { 1: "10vh", 2: "6.5vh", 3: "4.3vh" };
    var n = Math.min(3, courts.length);
    board.style.setProperty("--set-size", sizeByCount[n] || "13vh");
    board.style.setProperty("--name-size", nameByCount[n] || "3.8vh");
    courts.forEach(function (c) { board.appendChild(renderBand(c)); });
  }

  function showOffline(show) {
    var el = document.getElementById('offline');
    if (el) el.classList.toggle('show', !!show);
  }

  // ── Live-Poll ───────────────────────────────────────────────────────
  function stateUrl() {
    var u = '/combo/state?courts=' + encodeURIComponent(courtsParam);
    if (deviceId) u += '&device=' + encodeURIComponent(deviceId);
    return u;
  }
  function tick() {
    fetch(stateUrl(), { cache: 'no-store' })
      .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(function (data) {
        errorCount = 0; showOffline(false);
        render(data);
        setTimeout(tick, POLL_OK_MS);
      })
      .catch(function () {
        errorCount++;
        if (errorCount >= 2) showOffline(true);
        setTimeout(tick, POLL_FAIL_MS);
      });
  }
  tick();

  // ── Reassignment-Check (1 s, wie die anderen Info-Seiten, v0.9.26) ──
  function currentUrlMatches(redirectTo) {
    try {
      var here = new URL(location.href);
      here.searchParams.delete('device');
      var there = new URL(redirectTo, location.origin);
      return here.pathname === there.pathname &&
             here.searchParams.toString() === there.searchParams.toString();
    } catch (e) { return false; }
  }
  function navigateWithRotate(href) {
    var hereRotate = new URLSearchParams(location.search).get('rotate');
    if (hereRotate && href.indexOf('rotate=') < 0) {
      var sep = href.indexOf('?') >= 0 ? '&' : '?';
      href += sep + 'rotate=' + encodeURIComponent(hereRotate);
    }
    location.href = href;
  }
  // Deassign-Entprellung: zählt aufeinanderfolgende No-Redirect-Polls. Erst
  // ab DEASSIGN_AFTER wird auf /monitor navigiert — schützt gegen ein
  // transientes Leer-Lesen der Zuweisung (zusätzlich zum atomaren Schreiben).
  var noRedirectPolls = 0;
  var DEASSIGN_AFTER = 3;
  function checkReassignment() {
    if (!deviceId) return;
    fetch('/monitor/state?device=' + encodeURIComponent(deviceId), { cache: 'no-store' })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (s) {
        if (!s) return;
        if (s.deviceCode) lastDeviceCode = s.deviceCode;
        // Reihenfolge wie monitor.html: navigieren wir weg, wird KEIN Befehl
        // mehr ausgeführt (sonst bräche ein gleichzeitiges „Neu laden" die
        // Navigation ab). Erst Reassignment prüfen + früh raus …
        if (s.redirectTo) {
          noRedirectPolls = 0;
          if (!currentUrlMatches(s.redirectTo)) {
            var sep = s.redirectTo.indexOf('?') >= 0 ? '&' : '?';
            navigateWithRotate(s.redirectTo + sep + 'device=' + encodeURIComponent(deviceId));
            return;
          }
        } else {
          // Kein Redirect-Target mehr (z. B. Einzelfeld zugewiesen) → zurück zur
          // normalen Monitor-Seite. Entprellt: erst nach mehreren Polls, damit
          // ein einzelnes transientes Leer-Lesen die Kombi nicht strandet.
          if (++noRedirectPolls < DEASSIGN_AFTER) return;
          navigateWithRotate('/monitor?device=' + encodeURIComponent(deviceId));
          return;
        }
        // … wir bleiben auf dieser Seite → Fernbefehl behandeln. Dieser Poll
        // konsumiert den Command ohnehin; ohne das ginge „Identifizieren"
        // für die Kombi-Anzeige verloren (der bisherige Bug).
        handleCommand(s.command);
      })
      .catch(function () {});
  }
  setInterval(checkReassignment, 1000);

  // ─── Fernbefehle (Identifizieren/Neu laden) — Logik wie monitor.html ──
  var lastDeviceCode = '';
  var lastCmdId = 0;
  try { lastCmdId = parseInt(localStorage.getItem('bts-monitor-cmd-id') || '0', 10) || 0; }
  catch (e) {}
  var cmdBaselineSet = false;
  var identifyTimer = null;
  function saveCmdId() {
    try { localStorage.setItem('bts-monitor-cmd-id', String(lastCmdId)); } catch (e) {}
  }
  function handleCommand(cmd) {
    var id = (cmd && typeof cmd.id === 'number') ? cmd.id : 0;
    if (!cmdBaselineSet) {
      cmdBaselineSet = true;
      if (id > lastCmdId) { lastCmdId = id; saveCmdId(); }
      return;
    }
    if (!cmd || id <= lastCmdId) return;
    lastCmdId = id;
    saveCmdId();
    if (cmd.kind === 'reload') {
      location.reload();
    } else if (cmd.kind === 'identify') {
      showIdentify();
    }
  }
  function showIdentify() {
    var el = document.getElementById('identify-code');
    if (el) {
      el.textContent = lastDeviceCode
        || (deviceId.replace(/[^a-z0-9]/gi, '').slice(-4).toUpperCase());
    }
    var ov = document.getElementById('identify-overlay');
    if (!ov) return;
    ov.classList.add('show');
    if (identifyTimer) clearTimeout(identifyTimer);
    identifyTimer = setTimeout(function () { ov.classList.remove('show'); }, 10000);
  }
})();
</script>
</body>
</html>
