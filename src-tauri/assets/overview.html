<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Court-Übersicht</title>
<style>
/* ── Layout-Grundlagen ─────────────────────────────────────────────────
   Wie monitor.html: dunkles Marine, gelbe Akzente, slate-Töne. Größen
   in vmin damit die Skala auf jedem Bildschirm passt — Beamer wie TV. */
html, body {
  margin: 0; height: 100%; background: #0b1120; color: #f8fafc;
  font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  cursor: none; overflow: hidden;
}
/* Body als Flex-Spalte: die Kopfzeile nimmt ihre echte Höhe, `main` füllt
   exakt den Rest. (Vorher: main = calc(100% - 7vh) mit hartcodierter
   Kopfzeilen-Höhe → war die Kopfzeile real höher, lief das Grid unten aus
   dem Bild.) */
body { display: flex; flex-direction: column; }

/* Pivot-Unterstützung: ?rotate=90|180|270 → CSS-Transform am Wurzel-
   Element. So lässt sich derselbe Pi mit derselben URL um 90° rotieren,
   ohne im OS herumzuschrauben (xrandr-Pendant einfach im Browser). */
body.rotate-90  { transform: rotate(90deg);  transform-origin: 50vh 50vh; width: 100vh; height: 100vw; }
body.rotate-180 { transform: rotate(180deg); }
body.rotate-270 { transform: rotate(270deg); transform-origin: 50vh 50vh; width: 100vh; height: 100vw; }

header.bar {
  display: flex; align-items: baseline; gap: 2vw;
  padding: 1.2vh 3vw; flex: 0 0 auto;
  background: linear-gradient(180deg, #141f33, #1c2942);
  border-bottom: .3vh solid #334155;
}
header.bar .live-dot {
  width: 1.4vmin; height: 1.4vmin; border-radius: 50%;
  background: #f43f5e; box-shadow: 0 0 1.5vmin #f43f5e;
  animation: live-pulse 1.6s ease-in-out infinite;
  align-self: center;
}
@keyframes live-pulse { 0%,100% { opacity: 1 } 50% { opacity: .35 } }
header.bar .title {
  flex: 0 0 auto; font-size: 3.6vmin; font-weight: 800;
  letter-spacing: .02em; color: #fbbf24; text-transform: uppercase;
}
/* Hallenname direkt hinter dem Titel (spart die separate Zeile im Body). */
header.bar .bar-hall {
  flex: 0 0 auto; font-size: 3vmin; font-weight: 700; color: #e2e8f0;
  letter-spacing: .02em; text-transform: uppercase;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
header.bar .bar-hall:empty { display: none; }
header.bar .bar-hall:not(:empty)::before {
  content: "·"; margin-right: 1.6vw; color: #64748b; font-weight: 800;
}
header.bar .tournament {
  flex: 1 1 auto; font-size: 3vmin; font-weight: 600; color: #cbd5e1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

main {
  flex: 1 1 auto; min-height: 0; overflow: hidden;
  padding: 2vh 2vw; display: flex; flex-direction: column; gap: 1.5vh;
}

/* Court-Grid: Spaltenzahl wird per JS gesetzt (dynamisch nach Feldzahl),
   die Zeilen teilen sich die Höhe gleichmäßig (grid-auto-rows: 1fr) →
   wenige Felder = große Kacheln, die den Schirm füllen. */
.courts {
  display: grid; gap: 1.4vh 1.6vw;
  /* minmax(0,1fr) statt 1fr: ein nacktes 1fr ist implizit minmax(auto,1fr) →
     hohe Kacheln (gestapelte Doppel) wachsen über ihren Anteil und das Grid
     läuft unten aus dem Bild. minmax(0,…) zwingt gleiche Höhenteilung; der
     Kachel-`overflow:hidden` clippt im Notfall statt nach unten zu schieben. */
  grid-auto-rows: minmax(0, 1fr); flex: 1 1 auto; min-height: 0;
}
.court {
  background: linear-gradient(180deg, #1a2842, #0f1a30);
  border: .25vmin solid #334155; border-radius: 1.4vmin;
  padding: 1.6vh 1.8vw; display: flex; flex-direction: column;
  gap: 1vh; min-height: 0; overflow: hidden;
}
.court.empty { opacity: .55; }
.court.live  { border-color: #1f6f4a; }
.court.pause { border-color: #b08400; }
.court__head {
  display: flex; align-items: center; gap: 1.2vw; flex: 0 0 auto;
}
.court__name {
  font-size: 5vmin; font-weight: 900; color: #fbbf24; line-height: 1;
  font-variant-numeric: tabular-nums;
}
.court__status {
  font-size: 2.6vmin; font-weight: 700; color: #64748b;
  text-transform: uppercase; letter-spacing: .04em;
}
.court__status.live { color: #34d399; }
.court__status.pause { color: #fbbf24; }
.court__discipline {
  margin-left: auto; font-size: 2.6vmin; font-weight: 700; color: #94a3b8;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Aufruf-Uhr in der Wartephase (Plan 4): Minuten seit 1. Aufruf + Ampel.
   Ampelfarben wie die Einzelanzeige: ok neutral, warn gelb, due rot. */
.callchip {
  align-self: flex-start; margin: .4vh 0 0; padding: .3vh 1.4vw;
  border-radius: 1vmin; font-size: 2.4vmin; font-weight: 800;
  white-space: nowrap; letter-spacing: .01em;
  background: rgba(148,163,184,.16); color: #cbd5e1;
}
.callchip.warn { background: rgba(251,191,36,.18); color: #fde68a; }
.callchip.due  { background: rgba(244,63,94,.20); color: #fda4af; }

/* Teams + Sätze: Name(n) links, Satzstand rechts gross. */
.teams {
  display: flex; flex-direction: column; gap: .6vh;
  flex: 1 1 auto; justify-content: center; min-height: 0; overflow: hidden;
}
.trow { display: flex; align-items: center; gap: 1.2vw; min-width: 0; }
/* Bei Doppel stehen die beiden Partner UNTEREINANDER (je eigene Zeile mit
   Flagge + Name) – sonst teilen sie sich eine Zeile und werden abgeschnitten.
   Bei Einzel ist es einfach eine einzelne Zeile. */
.trow__names {
  flex: 1 1 auto; min-width: 0;
  display: flex; flex-direction: column; gap: .3vh;
  font-size: 2.9vmin; font-weight: 700; color: #e2e8f0;
}
.trow.winner .trow__names { color: #34d399; }
.trow__names .pl {
  display: flex; align-items: center; gap: .8vw; min-width: 0;
  line-height: 1.15;
}
/* Feste Flaggen-Box, damit die Namen der Partner bündig untereinander stehen –
   auch wenn ein Spieler keine Nationalität/Flagge hat (dann unsichtbar, aber
   Platz bleibt reserviert). */
.trow__names .flag {
  flex: 0 0 auto; width: 3.6vmin; height: 2.7vmin; object-fit: contain;
  border-radius: .3vh; box-shadow: 0 0 .4vh rgba(0,0,0,.5);
}
.trow__names .flag.hidden { visibility: hidden; box-shadow: none; }
.trow__names .nm {
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.trow__sets { flex: 0 0 auto; display: flex; gap: 1vw; font-variant-numeric: tabular-nums; }
.sset {
  min-width: 1.6ch; text-align: center;
  font-size: 4.4vmin; font-weight: 900; color: #64748b; line-height: 1;
}
.sset.won { color: #f8fafc; }
.sset.current { color: #fbbf24; }

.idle {
  height: 100%; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3vh;
  color: #94a3b8; text-align: center; padding: 6vmin;
}
.idle h1 { font-size: 6vmin; color: #fbbf24; margin: 0; }
.idle p { font-size: 3vmin; max-width: 70vw; line-height: 1.4; }

#offline {
  position: fixed; top: 1vh; right: 2vw;
  background: rgba(244,63,94,.18); color: #fda4af;
  border: .2vmin solid #b91c1c; border-radius: 1vmin;
  padding: .5vh 1.4vw; font-size: 2.4vmin; font-weight: 700;
  display: none;
}
#offline.show { display: block; }

/* ─── Identifizieren-Overlay (Fernbefehl) — wie monitor.html ─────────── */
#identify-overlay {
  position: fixed; inset: 0; display: none; z-index: 100;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 2vh; background: #fbbf24; color: #1a1206;
  animation: identify-flash 1s ease-in-out infinite;
}
#identify-overlay.show { display: flex; }
@keyframes identify-flash { 0%, 100% { opacity: 1; } 50% { opacity: .65; } }
#identify-overlay .i-code {
  font-size: 26vmin; font-weight: 900; line-height: 1; letter-spacing: .08em;
}
#identify-overlay .i-court { font-size: 7vmin; font-weight: 800; }
</style>
</head>
<body>
<header class="bar">
  <span class="live-dot" aria-hidden="true"></span>
  <span class="title">Court-Übersicht</span>
  <span class="bar-hall" id="bar-hall"></span>
  <span class="tournament" id="t-name"></span>
</header>
<main id="board"></main>
<div id="offline">Keine Verbindung zum Turnier-PC</div>
<div id="identify-overlay">
  <div class="i-code" id="identify-code">····</div>
  <div class="i-court" id="identify-court">Übersicht</div>
</div>

<script>
(function () {
  'use strict';

  // ── Konfiguration aus URL-Parametern ────────────────────────────────
  var params = new URLSearchParams(location.search);

  // Rotation: ?rotate=0|90|180|270 — body bekommt CSS-Klasse rotate-<n>.
  // Damit lässt sich ein Pivot-Monitor ohne OS-Eingriff drehen.
  var rotate = (params.get('rotate') || '0').replace(/[^0-9]/g, '');
  if (rotate === '90' || rotate === '180' || rotate === '270') {
    document.body.classList.add('rotate-' + rotate);
  }

  // Geräte-Code aus dem URL-Parameter (bts-monitor.sh haengt ihn an):
  // ?device=<8 chars>. Wenn gesetzt, pollen wir periodisch
  // /monitor/state, um Reassignment (Info→Court oder Info→anderes-Info)
  // zu erkennen und uns selbst umzuleiten.
  var deviceId = (params.get('device') || '').trim();

  // ── Diagnose-Mini-Logger ──────────────────────────────────────────────
  // Wie combo.html: JS-Fehler + Schlüsselereignisse best-effort an /pi-log
  // (lokal + Cloud, Datei mon-<device>.log). Nur LAN; Cloud-Modus scheitert still.
  var MLOG = [], MLOG_MAX = 200;
  function mlog(level, event, detail) {
    var e = { t: Date.now(), level: level, event: event };
    if (detail !== undefined) e.d = detail;
    MLOG.push(e); while (MLOG.length > MLOG_MAX) MLOG.shift();
    try { console.log('[' + new Date(e.t).toISOString() + '] ' + level + ' ' + event, detail || ''); } catch (x) {}
  }
  function mlogDevice() {
    var id = (deviceId || '').replace(/[^a-z0-9_-]/gi, '').slice(0, 56);
    return 'mon-' + (id || 'unbekannt');
  }
  function uploadMonitorLog() {
    try {
      var body = 'Monitor overview · device=' + mlogDevice() + '\nUA: ' + navigator.userAgent
        + '\nGeneriert: ' + new Date().toISOString() + '\n\n'
        + MLOG.map(function (e) {
            return '[' + new Date(e.t).toISOString() + '] ' + e.level + ' ' + e.event
              + (e.d !== undefined ? ' ' + JSON.stringify(e.d) : '');
          }).join('\n') + '\n';
      fetch('/pi-log?device=' + encodeURIComponent(mlogDevice()), {
        method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: body, keepalive: true,
      }).catch(function () {});
    } catch (x) {}
  }
  window.addEventListener('error', function (ev) {
    try { mlog('error', 'js_error', { msg: String((ev && ev.message) || ev), src: (ev && ev.filename) || '', line: (ev && ev.lineno) || 0 }); uploadMonitorLog(); } catch (x) {}
  });
  window.addEventListener('unhandledrejection', function (ev) {
    try { var r = ev && ev.reason; mlog('error', 'unhandled_rejection', { msg: r != null ? (r.message || String(r)) : 'unknown' }); uploadMonitorLog(); } catch (x) {}
  });
  window.addEventListener('pagehide', uploadMonitorLog);
  mlog('info', 'monitor_boot', {});

  // Hallen-Filter: ?halle=<Name> — wie bei badhub/live, zeigt nur Felder
  // dieser Halle. Vergleich getrimmt + case-insensitiv. Ist er gesetzt, zeigt
  // dieser Monitor fest genau diese Halle (keine Rotation).
  var hallFilter = (params.get('halle') || '').trim();
  function hallKey(name) {
    return (name == null ? '' : String(name)).trim().toLowerCase();
  }

  // Auto-Rotation: erkennt der Monitor MEHRERE Hallen und ist KEIN ?halle=
  // gesetzt, zeigt er jede Halle nacheinander im Vollbild (statt alle
  // gestapelt zu quetschen). Intervall via ?hallSeconds=<n> (Default 12,
  // min 3). Eigener Param – nicht der Pivot-`rotate` oben.
  var hallSeconds = parseInt(params.get('hallSeconds'), 10);
  if (!hallSeconds || hallSeconds < 3) hallSeconds = 12;
  var lastData = null; // letzte Daten, damit der Rotations-Timer neu rendern kann
  var hallIdx = 0; // aktuell gezeigte Halle (Index in der Hallen-Liste)
  var hallTimer = null;
  // Aufruf-Timer: Server-Zeit + Config aus dem letzten /health-Poll (Plan 4),
  // damit renderCourt „Zeit seit Aufruf" relativ zur Server-Uhr rechnen kann.
  var callNow = 0;
  var callTimer = null;

  // Anzeige-Cap bei sehr großen Turnieren (sollte nicht greifen, dient
  // nur als Sicherheit gegen pathologische Daten).
  var MAX_COURTS = 64;

  // ── DOM-Helfer ──────────────────────────────────────────────────────
  function h(tag, cls, text) {
    var el = document.createElement(tag);
    if (cls) el.className = cls;
    if (text != null) el.textContent = text;
    return el;
  }

  function setStatus(text, cssClass) {
    var el = h('span', 'court__status' + (cssClass ? ' ' + cssClass : ''), text);
    return el;
  }

  // Gruppiert Courts nach Halle. Reihenfolge nach erstem Vorkommen.
  // Felder ohne Halle landen in einer Restgruppe (ohne Überschrift).
  function groupByHall(courts) {
    var groups = []; var byKey = {};
    courts.forEach(function (c) {
      var key = hallKey(c.location);
      if (!byKey[key]) { byKey[key] = { name: c.location || '', courts: [] }; groups.push(byKey[key]); }
      byKey[key].courts.push(c);
    });
    return groups;
  }

  // Flaggen-IMG aus IOC-3-Nationalität; unbekannt/leer → versteckt.
  function flagEl(nat) {
    var img = document.createElement('img');
    img.className = 'flag';
    var code = (nat || '').trim().toUpperCase();
    if (code) {
      img.src = '/flags/' + encodeURIComponent(code) + '.svg';
      img.onerror = function () { img.classList.add('hidden'); };
    } else {
      img.classList.add('hidden');
    }
    return img;
  }

  function setVal(s, idx) {
    if (Array.isArray(s)) return s[idx] != null ? s[idx] : 0;
    return idx === 0
      ? (s.a != null ? s.a : (s[0] != null ? s[0] : 0))
      : (s.b != null ? s.b : (s[1] != null ? s[1] : 0));
  }

  // „Zeit seit Aufruf"-Chip (Plan 4): hochzählende Minuten seit dem 1. Aufruf
  // + Ampel (1. → 2. → Letzter Aufruf) wie auf der Einzelanzeige. Nur solange
  // das Spiel aufgerufen, aber NOCH NICHT am Zählen ist (Wartephase) — sonst
  // würde ein Board voller laufender Spiele nach 4 min komplett rot; der
  // laufende Satzstand ist dann ohnehin der Status. Leer, wenn Timer aus/
  // keine Aufrufzeit.
  function callChip(c) {
    if (!callTimer || !callTimer.enabled) return null;
    if (typeof c.on_court_since_ms !== 'number' || c.on_court_since_ms <= 0) return null;
    var sec = Math.max(0, Math.floor((callNow - c.on_court_since_ms) / 1000));
    var min = sec / 60;
    var label = '1. Aufruf', tone = 'ok';
    if (typeof callTimer.thirdCallMinutes === 'number' && callTimer.thirdCallMinutes > 0
        && min >= callTimer.thirdCallMinutes) {
      label = 'Letzter Aufruf'; tone = 'due';
    } else if (typeof callTimer.secondCallMinutes === 'number' && callTimer.secondCallMinutes > 0
        && min >= callTimer.secondCallMinutes) {
      label = '2. Aufruf'; tone = 'warn';
    }
    var mins = Math.floor(min);
    var txt = (mins < 1 ? 'gerade aufgerufen' : 'vor ' + mins + ' min') + ' · ' + label;
    return h('span', 'callchip ' + tone, txt);
  }

  // Spielt das Feld schon (Punkte gefallen oder Aufschläger bekannt)? Dann ist
  // es keine Wartephase mehr → kein Aufruf-Chip.
  function hasStarted(c) {
    if (c.serving_team && c.serving_team > 0) return true;
    var sets = Array.isArray(c.sets) ? c.sets : [];
    return sets.some(function (s) { return (setVal(s, 0) + setVal(s, 1)) > 0; });
  }

  function renderCourt(c) {
    var card = h('div', 'court');
    var head = h('div', 'court__head');
    head.appendChild(h('span', 'court__name', c.court || ('Feld ' + c.court_id)));

    var isLive = c.match_id && c.match_id > 0 && c.team1 && c.team1.length > 0;
    if (!isLive) {
      card.classList.add('empty');
      head.appendChild(setStatus('frei'));
      card.appendChild(head);
      return card;
    }

    var isPause = !!(c.injury || c.official_call);
    if (c.injury) {
      card.classList.add('pause');
      head.appendChild(setStatus('Behandlung', 'pause'));
    } else if (c.official_call) {
      card.classList.add('pause');
      head.appendChild(setStatus('TL', 'pause'));
    } else {
      card.classList.add('live');
      head.appendChild(setStatus('läuft', 'live'));
    }

    head.appendChild(h('span', 'court__discipline', c.match_name || ''));
    card.appendChild(head);

    // Aufruf-Uhr nur in der Wartephase (aufgerufen, noch nicht am Zählen).
    if (!isPause && !hasStarted(c)) {
      var chip = callChip(c);
      if (chip) card.appendChild(chip);
    }

    var sets = Array.isArray(c.sets) ? c.sets : [];
    var lastIdx = sets.length - 1;
    var running = !isPause;

    // Eine Team-Zeile: bei Doppel die zwei Partner UNTEREINANDER (je Flagge +
    // Name), bei Einzel eine einzelne Zeile; Satzstand rechts.
    function teamRow(names, nats, selfIdx, otherIdx) {
      var row = h('div', 'trow');
      var nameBox = h('div', 'trow__names');
      var list = (names && names.length) ? names : ['—'];
      list.forEach(function (n, i) {
        var pl = h('div', 'pl');
        pl.appendChild(flagEl(nats && nats[i]));
        pl.appendChild(h('span', 'nm', n));
        nameBox.appendChild(pl);
      });
      row.appendChild(nameBox);
      var setsEl = h('div', 'trow__sets');
      sets.forEach(function (s, i) {
        var mine = setVal(s, selfIdx), theirs = setVal(s, otherIdx);
        var cls = 'sset';
        if (i === lastIdx && running) cls += ' current';
        else if (mine > theirs) cls += ' won';
        setsEl.appendChild(h('span', cls, String(mine)));
      });
      row.appendChild(setsEl);
      return row;
    }

    var teams = h('div', 'teams');
    teams.appendChild(teamRow(c.team1, c.team1_nationalities, 0, 1));
    teams.appendChild(teamRow(c.team2, c.team2_nationalities, 1, 0));
    card.appendChild(teams);

    return card;
  }

  function renderIdle(msg) {
    var idle = h('div', 'idle');
    idle.appendChild(h('h1', null, 'Court-Übersicht'));
    idle.appendChild(h('p', null, msg || 'Warten auf Turnier-Daten…'));
    return idle;
  }

  // Court-Grid einer Halle (dynamische Spaltenzahl).
  function buildGrid(g) {
    var grid = h('div', 'courts');
    // Dynamische Spaltenzahl: wenige Felder → wenige Spalten → grosse Kacheln,
    // die (zusammen mit grid-auto-rows:minmax(0,1fr)) den Schirm füllen.
    grid.style.gridTemplateColumns = 'repeat(' + gridColsFor(g.courts.length) + ', 1fr)';
    g.courts.forEach(function (c) { grid.appendChild(renderCourt(c)); });
    return grid;
  }

  // Eine Halle als Vollbild-Section: Kopf (Name [+ Zyklus „1 / N"]) + Grid.
  // Hallenname (+ Zyklus „1 / N" bei Rotation) in die Kopfzeile schreiben –
  // statt einer eigenen Zeile im Body (spart vertikalen Platz).
  function setBarHall(name, idx, total) {
    var el = document.getElementById('bar-hall');
    if (!el) return;
    if (!name) { el.textContent = ''; return; }
    el.textContent = total > 1 ? (name + '  ' + (idx + 1) + ' / ' + total) : name;
  }

  function stopHallRotation() {
    if (hallTimer) { clearInterval(hallTimer); hallTimer = null; }
    hallIdx = 0;
  }
  function startHallRotation() {
    if (hallTimer) return; // läuft bereits
    hallTimer = setInterval(function () {
      hallIdx += 1; // render() nimmt modulo der aktuellen Hallenzahl
      render(lastData);
    }, hallSeconds * 1000);
  }

  function render(data) {
    lastData = data;
    // Aufruf-Timer-Bezug aus dem Poll übernehmen (Server-Uhr gegen Geräte-Drift).
    callNow = (data && typeof data.serverNowMs === 'number' && data.serverNowMs > 0)
      ? data.serverNowMs : Date.now();
    callTimer = (data && data.callTimer) || null;
    var board = document.getElementById('board');
    board.textContent = '';

    var courts = Array.isArray(data && data.courts) ? data.courts.slice(0, MAX_COURTS) : [];

    // ?halle=-Filter, falls gesetzt und mindestens ein Feld diese Halle hat.
    if (hallFilter) {
      var wanted = hallKey(hallFilter);
      var matched = courts.filter(function (c) { return hallKey(c.location) === wanted; });
      if (matched.length > 0) courts = matched;
    }

    if (courts.length === 0) {
      stopHallRotation();
      setBarHall('');
      board.appendChild(renderIdle('Noch keine Felder aktiv. Sobald der Liveticker läuft, erscheinen sie hier.'));
      return;
    }

    var groups = groupByHall(courts);
    // Mehrere benannte Hallen UND kein fester ?halle=-Filter → Auto-Rotation:
    // immer nur EINE Halle im Vollbild, zyklisch durchgewechselt.
    var rotating = !hallFilter && groups.filter(function (g) { return g.name; }).length >= 2;

    if (rotating) {
      var idx = hallIdx % groups.length;
      var g = groups[idx];
      setBarHall(g.name, idx, groups.length); // Name + „1 / N" in die Kopfzeile
      board.appendChild(buildGrid(g));
      startHallRotation();
      return;
    }

    // Eine (ggf. gefilterte) Halle im Vollbild: Name in die Kopfzeile, nur das
    // Grid in den Body. Bei genau einer Halle der Normalfall; ein gemischter
    // Mehr-Gruppen-Fall (benannt + unbenannt) fällt auf gestapelte Grids zurück.
    stopHallRotation();
    if (groups.length === 1) {
      setBarHall(groups[0].name || '');
      board.appendChild(buildGrid(groups[0]));
    } else {
      setBarHall('');
      groups.forEach(function (g) { board.appendChild(buildGrid(g)); });
    }
  }

  // Spaltenzahl je Feldanzahl: 1→1, 2→2, 3-4→2, 5-6→3, 7-9→3, mehr→4.
  // ceil(sqrt(n)) ergibt ein ausgewogenes, möglichst quadratisches Raster.
  function gridColsFor(n) {
    if (n <= 1) return 1;
    return Math.min(4, Math.ceil(Math.sqrt(n)));
  }

  // ── Poll-Schleife ──────────────────────────────────────────────────
  var POLL_OK_MS = 5000;
  var POLL_FAIL_MS = 8000;
  var errorCount = 0;

  function showOffline(show) {
    var el = document.getElementById('offline');
    if (el) el.classList.toggle('show', !!show);
  }

  // Reassignment-Check: alle 30 s gegen /monitor/state pruefen, ob das
  // Geraet inzwischen einem anderen Target zugewiesen ist. Wenn ja:
  // selbst umleiten (zurueck auf /monitor fuer ein Feld, oder weiter zu
  // /info/preparation etc.).
  // Zeigt diese Seite bereits das vom Server gewünschte Ziel? Vergleich über
  // Pfad + Query (z. B. ?halle=…), aber OHNE die laufzeit-eigenen Parameter
  // `device`/`rotate`/`hallSeconds`. WICHTIG: ein naiver Vergleich gegen
  // location.pathname (ohne Query) würde bei einem ?halle=-Ziel IMMER abweichen
  // → Endlos-Redirect/Flackern (Bug bis v0.9.89).
  function currentUrlMatches(redirectTo) {
    try {
      var here = new URL(location.href);
      here.searchParams.delete('device');
      here.searchParams.delete('rotate');
      here.searchParams.delete('hallSeconds');
      var there = new URL(redirectTo, location.origin);
      return here.pathname === there.pathname &&
             here.searchParams.toString() === there.searchParams.toString();
    } catch (e) { return false; }
  }
  function navigateWithRotate(href) {
    // ?rotate=…-Wert ueber den Wechsel mitnehmen (Code-Review v0.9.21 MEDIUM).
    var hereRotate = new URLSearchParams(location.search).get('rotate');
    if (hereRotate && href.indexOf('rotate=') < 0) {
      var sep = href.indexOf('?') >= 0 ? '&' : '?';
      href += sep + 'rotate=' + encodeURIComponent(hereRotate);
    }
    location.href = href;
  }
  // Deassign-Entprellung: erst nach mehreren No-Redirect-Polls weg navigieren
  // (schützt gegen transientes Leer-Lesen der Zuweisung, zusätzlich zum
  // atomaren Schreiben server-seitig).
  var noRedirectPolls = 0;
  var DEASSIGN_AFTER = 3;
  function checkReassignment() {
    if (!deviceId) return;
    fetch('/monitor/state?device=' + encodeURIComponent(deviceId), { cache: 'no-store' })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (s) {
        if (!s) return;
        if (s.deviceCode) lastDeviceCode = s.deviceCode;
        // Reihenfolge wie monitor.html: navigieren wir weg, wird KEIN Befehl
        // mehr ausgeführt (sonst würde ein gleichzeitiges „Neu laden" die
        // Navigation abbrechen). Erst Reassignment prüfen + früh raus …
        if (s.redirectTo && !currentUrlMatches(s.redirectTo)) {
          noRedirectPolls = 0;
          var sep = s.redirectTo.indexOf('?') >= 0 ? '&' : '?';
          navigateWithRotate(s.redirectTo + sep + 'device=' + encodeURIComponent(deviceId));
          return;
        }
        if (!s.redirectTo) {
          // Kein Info-Target mehr → zurueck zur Feld-/Pairing-Seite. Entprellt,
          // damit ein einzelnes transientes Leer-Lesen nicht sofort wegnavigiert.
          if (++noRedirectPolls < DEASSIGN_AFTER) return;
          mlog('info', 'deassign_to_monitor', { polls: noRedirectPolls });
          uploadMonitorLog();
          navigateWithRotate('/monitor?device=' + encodeURIComponent(deviceId));
          return;
        }
        noRedirectPolls = 0;
        // … wir bleiben auf dieser Seite → Fernbefehl behandeln. Dieser Poll
        // konsumiert den Command ohnehin; ohne das ginge „Identifizieren"
        // für die Übersicht verloren (der bisherige Bug).
        handleCommand(s.command);
      })
      .catch(function () {});
  }
  setInterval(checkReassignment, 1000);

  // ─── Fernbefehle (Identifizieren/Neu laden) ──────────────────────────
  // Identische Logik wie monitor.html: der erste Poll setzt nur die Basis
  // (ein offener Command wird nicht nachgeholt), danach wird jeder neue
  // Command genau einmal per id ausgeführt.
  var lastDeviceCode = '';
  var lastCmdId = 0;
  try { lastCmdId = parseInt(localStorage.getItem('bts-monitor-cmd-id') || '0', 10) || 0; }
  catch (e) {}
  var cmdBaselineSet = false;
  var identifyTimer = null;
  function saveCmdId() {
    try { localStorage.setItem('bts-monitor-cmd-id', String(lastCmdId)); } catch (e) {}
  }
  function handleCommand(cmd) {
    var id = (cmd && typeof cmd.id === 'number') ? cmd.id : 0;
    if (!cmdBaselineSet) {
      cmdBaselineSet = true;
      if (id > lastCmdId) { lastCmdId = id; saveCmdId(); }
      return;
    }
    if (!cmd || id <= lastCmdId) return;
    lastCmdId = id;
    saveCmdId();
    if (cmd.kind === 'reload') {
      location.reload();
    } else if (cmd.kind === 'identify') {
      showIdentify();
    }
  }
  function showIdentify() {
    var el = document.getElementById('identify-code');
    if (el) {
      el.textContent = lastDeviceCode
        || (deviceId.replace(/[^a-z0-9]/gi, '').slice(-4).toUpperCase());
    }
    var ov = document.getElementById('identify-overlay');
    if (!ov) return;
    ov.classList.add('show');
    if (identifyTimer) clearTimeout(identifyTimer);
    identifyTimer = setTimeout(function () { ov.classList.remove('show'); }, 10000);
  }

  function healthUrl() {
    // Geraete-ID als Heartbeat-Markierung (v0.9.22) — Server zaehlt
    // den /health-Poll dann als Online-Lebenszeichen.
    return deviceId
      ? '/health?device=' + encodeURIComponent(deviceId)
      : '/health';
  }
  function tick() {
    fetch(healthUrl(), { cache: 'no-store' })
      .then(function (r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function (data) {
        errorCount = 0; showOffline(false);
        render(data);
        // Turniername könnten wir aus health nicht, /api/snapshot wäre besser —
        // erstmal leer lassen, kein Drama für die Funktionalität.
        setTimeout(tick, POLL_OK_MS);
      })
      .catch(function () {
        errorCount++;
        if (errorCount >= 2) showOffline(true);
        setTimeout(tick, POLL_FAIL_MS);
      });
  }
  tick();
})();
</script>
</body>
</html>
