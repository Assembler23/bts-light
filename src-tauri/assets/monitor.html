<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Court-Monitor</title>
  <style>
    /*
     * Court-Monitor – read-only TV-Anzeige am Spielfeld (Layout „A — Geteilt").
     * Reine Anzeige: pollt `./state`, schreibt nie zurück. Alle Maße in
     * vw/vh/vmin → füllt jeden TV 32"–55" ohne Anpassung.
     */
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden;
      background: #0b1120; color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      cursor: none;
    }
    /* Broadcast-Tiefe: dezenter Lichtschein oben mittig. */
    #root {
      position: relative; width: 100vw; height: 100vh;
      background: radial-gradient(ellipse 80% 55% at 50% 0%, #18263f 0%, #0b1120 70%);
    }

    /* ─── Werbe-/Leerlauf-Ansicht ─────────────────────────────────────── */
    #ad-view {
      position: absolute; inset: 0; display: none;
      align-items: center; justify-content: center; background: #000;
    }
    #ad-view.show { display: flex; }
    #ad-img { max-width: 100%; max-height: 100%; object-fit: contain; }
    #ad-fallback {
      display: none; flex-direction: column; align-items: center; gap: 2vh;
      text-align: center; padding: 6vmin;
    }
    #ad-fallback.show { display: flex; }
    #ad-fallback .tn { font-size: 5vmin; font-weight: 800; opacity: .9; }
    #ad-fallback .sub { font-size: 3.4vmin; opacity: .45; letter-spacing: .04em; }

    /* ─── Match-Ansicht ───────────────────────────────────────────────── */
    #match-view { position: absolute; inset: 0; display: none; flex-direction: column; }
    #match-view.show { display: flex; }

    header.bar {
      flex: 0 0 auto; display: flex; align-items: center; gap: 1.6vmin;
      padding: 1.5vh 3vw;
      background: linear-gradient(180deg, #1c2942, #141f33);
      border-bottom: .3vh solid #fbbf24;
    }
    /* Pulsierender „live"-Punkt vor der Feldnummer. */
    header.bar .live-dot {
      flex: 0 0 auto; width: 1.5vmin; height: 1.5vmin; border-radius: 50%;
      background: #fbbf24; box-shadow: 0 0 1.6vmin rgba(251, 191, 36, .8);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
    header.bar .court {
      font-size: 4vmin; font-weight: 900; letter-spacing: .1em;
      text-transform: uppercase; color: #fbbf24;
    }
    /* Spieldauer neben der Feldnummer (Stoppuhr-Symbol + Minuten). */
    header.bar .match-clock {
      flex: 0 0 auto; font-size: 3vmin; font-weight: 700;
      color: #94a3b8; font-variant-numeric: tabular-nums;
    }
    header.bar .match-clock:empty { display: none; }
    /* Aufruf-Timer (1./2./3. Aufruf): hochzählende Uhr + Ampel-Chip. */
    header.bar .call-timer {
      flex: 0 0 auto; font-size: 3vmin; font-weight: 800;
      font-variant-numeric: tabular-nums; padding: .3vmin 1.4vmin;
      border-radius: 999px; letter-spacing: .02em;
    }
    header.bar .call-timer:empty { display: none; }
    header.bar .call-timer.ok   { background: #064e3b; color: #6ee7b7; }
    header.bar .call-timer.warn { background: #78350f; color: #fcd34d; }
    header.bar .call-timer.due  {
      background: #7f1d1d; color: #fecaca;
      animation: callpulse 1s ease-in-out infinite;
    }
    @keyframes callpulse { 0%,100% { opacity: 1; } 50% { opacity: .55; } }
    header.bar .discipline {
      margin-left: auto; font-size: 3.4vmin; font-weight: 700;
      letter-spacing: .03em; color: #cbd5e1;
    }

    .half {
      flex: 1 1 0; display: flex; align-items: center;
      gap: 3vw; padding: 0 4vw; min-height: 0;
      border-left: .6vmin solid transparent;
      transition: background .25s ease, border-color .25s ease;
    }
    /* Aufschlag-Seite: dezenter Akzentbalken + Farbverlauf. */
    .half.serving {
      border-left-color: #fbbf24;
      background: linear-gradient(90deg, rgba(251, 191, 36, .08), transparent 35%);
    }
    .divider {
      flex: 0 0 auto; height: .3vh;
      background: linear-gradient(
        90deg, transparent, #334155 15%, #334155 85%, transparent);
    }

    .players { flex: 1 1 auto; display: flex; flex-direction: column; gap: 1.4vh; min-width: 0; }
    .player { display: flex; align-items: center; gap: 2.4vw; min-width: 0; }
    .flag {
      flex: 0 0 auto; width: 11vmin; height: 6.6vmin; object-fit: cover;
      border-radius: .8vmin; background: #334155;
      box-shadow: 0 0 0 .2vmin rgba(255, 255, 255, .18),
                  0 .6vmin 1.6vmin rgba(0, 0, 0, .45);
    }
    .flag.hidden { visibility: hidden; }
    /* Name im Broadcast-Stil: Vorname klein darüber, Nachname groß. So
       bleiben auch lange (Doppel-)Namen aus der Distanz gut lesbar.
       `overflow: hidden` setzt die Flex-Mindestbreite auf 0 → der Name
       schrumpft zuverlässig, statt die Zeile zu sprengen (dann greift die
       Ellipsis von .given/.family). */
    .name {
      display: flex; flex-direction: column; min-width: 0;
      overflow: hidden; line-height: 1.03;
    }
    .name .given {
      font-size: 2.9vmin; font-weight: 600; letter-spacing: .07em;
      text-transform: uppercase; color: #94a3b8;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .name .given:empty { display: none; }
    .name .family {
      font-size: 7vmin; font-weight: 800;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .players.doubles .name .given { font-size: 2.4vmin; }
    .players.doubles .name .family { font-size: 5.4vmin; }
    .serve-dot {
      flex: 0 0 auto; font-size: 4.4vmin; color: #fbbf24; line-height: 1;
      opacity: 0; transition: opacity .15s;
    }
    .serve-dot.on { opacity: 1; }

    /* Satzstand rechts: abgeschlossene Sätze klein, laufender Satz groß. */
    .scores { flex: 0 0 auto; display: flex; align-items: center; gap: 2.4vw; }
    .sets-done { display: flex; gap: 1.6vw; }
    .set-done {
      font-size: 7vmin; font-weight: 800; color: #64748b;
      font-variant-numeric: tabular-nums;
    }
    .set-current {
      font-size: 15vmin; font-weight: 900; line-height: 1;
      font-variant-numeric: tabular-nums; min-width: 2ch; text-align: center;
      padding: .4vmin 2.4vw; border-radius: 2vmin;
      color: #f8fafc;
      background: linear-gradient(180deg, #11203a, #070d1a);
      border: .25vmin solid #2b3a55;
    }
    /* Aufschlag: Score-Karte leuchtet amber. */
    .set-current.serving {
      color: #1a1206;
      background: linear-gradient(180deg, #fcd34d, #f59e0b);
      border-color: #fde68a;
      box-shadow: 0 0 6vmin rgba(251, 191, 36, .45);
    }

    /* Steht das Ergebnis fest: kein laufender Satz mehr, dafür das
       Endergebnis groß; der Gewinner jedes Satzes hell hervorgehoben,
       der Verlierer bleibt gedämpft. */
    .scores.decided .set-done { font-size: 11vmin; }
    .set-done.won { color: #f8fafc; }
    /* Sieger-Hälfte: dezenter grüner Akzent (analog zur Aufschlag-Hälfte). */
    .half.winner {
      border-left-color: #34d399;
      background: linear-gradient(90deg, rgba(52, 211, 153, .10), transparent 35%);
    }
    .winner-mark { flex: 0 0 auto; font-size: 9vmin; line-height: 1; }

    footer.bar {
      flex: 0 0 auto; display: flex; justify-content: flex-end; gap: 1.5vw;
      padding: 1.1vh 3vw;
      background: linear-gradient(180deg, #141f33, #1c2942);
      border-top: .3vh solid #334155;
      font-size: 2.8vmin; font-weight: 600; color: #94a3b8;
    }
    footer.bar .dot-sep { opacity: .5; }
    footer.bar:empty { display: none; }

    /* ─── Retro-Pausen-Timer (Split-Flap, „Flughafentafel") ───────────── */
    #timer-overlay {
      position: absolute; inset: 0; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 4vh; background: rgba(2,6,23,.93);
    }
    #timer-overlay.show { display: flex; }
    #timer-overlay .label {
      font-size: 5vmin; font-weight: 800; letter-spacing: .12em;
      text-transform: uppercase; color: #fbbf24;
    }
    .flaps { display: flex; gap: 1.2vmin; }
    .flap {
      position: relative; width: 13vmin; height: 19vmin;
      background: #18202e; border-radius: 1.4vmin;
      box-shadow: 0 1vmin 3vmin rgba(0,0,0,.6);
      display: flex; align-items: center; justify-content: center;
      font-size: 15vmin; font-weight: 900; line-height: 1;
      font-variant-numeric: tabular-nums; color: #f1f5f9;
      overflow: hidden;
    }
    /* Waagerechte Teilungslinie der Klappanzeige. */
    .flap::after {
      content: ""; position: absolute; left: 0; right: 0; top: 50%;
      height: .5vmin; background: #0b0f17; transform: translateY(-50%);
    }
    .flap.colon { width: 6vmin; background: transparent; box-shadow: none; }
    .flap.colon::after { display: none; }
    .flap.flip { animation: flap-flip .32s ease-in; }
    @keyframes flap-flip {
      0%   { transform: rotateX(0deg);   filter: brightness(1); }
      49%  { transform: rotateX(-88deg); filter: brightness(.45); }
      50%  { transform: rotateX(88deg);  filter: brightness(.45); }
      100% { transform: rotateX(0deg);   filter: brightness(1); }
    }

    #offline {
      position: absolute; left: 1.5vw; bottom: 1.5vh;
      font-size: 2.2vmin; color: #ef4444; opacity: 0; transition: opacity .3s;
    }
    #offline.show { opacity: .8; }

    /* ─── Default-Seite: Badhub-Logo (Gerät noch keinem Target zugewiesen) ─
       Klar/aufgeraeumt: nur das Logo zentriert, gross. Subtiler
       Atem-Glow im Hintergrund, damit der TV nicht statisch wirkt.
       Den Device-Code blendet das "Identifizieren"-Overlay ein. */
    #pairing-view {
      position: absolute; inset: 0; display: none;
      flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; gap: 3vmin;
      background: radial-gradient(ellipse at center, #1a2238 0%, #0b1120 70%);
    }
    #pairing-view.show { display: flex; }
    /* Logo wie im bts-light-App-Header: dunkles Rounded-Square mit
       Federball-Emoji. Genau dieselbe Optik wie in Dashboard.tsx. */
    #pairing-view .logo {
      width: 32vmin; height: 32vmin;
      display: flex; align-items: center; justify-content: center;
      background: #1e293b; border-radius: 6vmin;
      font-size: 22vmin; line-height: 1;
      /* Emoji-Schriften erzwingen (Pi OS Lite nutzt sonst eine Mono-Fallback). */
      font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", system-ui, sans-serif;
      box-shadow: 0 .8vmin 4vmin rgba(0, 0, 0, .35), inset 0 0 0 .3vmin #334155;
      animation: badhub-breathe 4s ease-in-out infinite;
    }
    @keyframes badhub-breathe {
      0%, 100% { transform: scale(1);    box-shadow: 0 .8vmin 4vmin rgba(0, 0, 0, .35), inset 0 0 0 .3vmin #334155; }
      50%      { transform: scale(1.03); box-shadow: 0 1.2vmin 6vmin rgba(251, 191, 36, .15), inset 0 0 0 .3vmin #475569; }
    }
    /* Wordmark (gross) + Untertitel (klein) unter dem Logo. */
    #pairing-view .wordmark {
      font-size: 5vmin; letter-spacing: .15em;
      color: #cbd5e1; font-weight: 700;
    }
    #pairing-view .subtitle {
      font-size: 2.6vmin; letter-spacing: .3em; text-transform: uppercase;
      color: #64748b; font-weight: 600;
    }

    /* ─── Identifizieren-Overlay (Fernbefehl) ────────────────────────── */
    #identify-overlay {
      position: absolute; inset: 0; display: none; z-index: 10;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 2vh; background: #fbbf24; color: #1a1206;
      animation: identify-flash 1s ease-in-out infinite;
    }
    #identify-overlay.show { display: flex; }
    @keyframes identify-flash { 0%, 100% { opacity: 1; } 50% { opacity: .65; } }
    #identify-overlay .i-code {
      font-size: 26vmin; font-weight: 900; line-height: 1; letter-spacing: .08em;
    }
    #identify-overlay .i-court { font-size: 7vmin; font-weight: 800; }
  </style>
</head>
<body>
  <div id="root">
    <div id="ad-view">
      <img id="ad-img" alt="" />
      <div id="ad-fallback">
        <div class="tn" id="fallback-tn">bts-light</div>
        <div class="sub">Kein Spiel auf diesem Feld</div>
      </div>
    </div>

    <div id="match-view">
      <header class="bar">
        <span class="live-dot" aria-hidden="true"></span>
        <span class="court" id="court-label">__COURT_LABEL__</span>
        <span class="match-clock" id="match-clock"></span>
        <span class="call-timer" id="call-timer"></span>
        <span class="discipline" id="discipline"></span>
      </header>
      <section class="half" id="half1"></section>
      <div class="divider"></div>
      <section class="half" id="half2"></section>
      <footer class="bar" id="footer"></footer>
    </div>

    <div id="timer-overlay">
      <div class="label" id="timer-label">Pause</div>
      <div class="flaps" id="timer-flaps"></div>
    </div>

    <div id="pairing-view">
      <div class="logo" aria-label="Federball">🏸</div>
      <div class="wordmark">badhub.de</div>
      <div class="subtitle">BTS light</div>
    </div>

    <div id="identify-overlay">
      <div class="i-code" id="identify-code">····</div>
      <div class="i-court" id="identify-court"></div>
    </div>

    <div id="offline">Verbindung unterbrochen</div>
  </div>

  <script>
  "use strict";
  // Betriebsmodus + Basis-Pfad – vom Server eingesetzt. `device` = Gerät,
  // das sein Feld erst über die Zuweisung im Tool bekommt; `fixed` = fest
  // auf ein Feld verdrahtet. BASE ist der URL-Präfix (z. B. "/" oder
  // "/<namespace>/") für Flaggen, Werbung und die State-Abfrage.
  var MODE = "__MODE__";
  var BASE = "__BASE__";
  // Feldname – wird vom ersten /state-Poll gesetzt. Bewusst NICHT als
  // Platzhalter in dieses JS-Literal gebacken (nur in den HTML-Span oben,
  // dort HTML-escaped), damit kein Court-Name den String-Literal-Kontext
  // aufbrechen kann.
  var COURT_LABEL = "";

  // Geräte-ID (nur Geräte-Modus). Bevorzugt aus dem URL-Parameter
  // `?device=` – der Pi-Kiosk setzt dort seine Hardware-Seriennummer ein,
  // damit eine geklonte SD-Karte trotzdem je Pi eindeutig bleibt. Fehlt
  // der Parameter (z. B. Aufruf direkt im Browser), eine zufällige,
  // dauerhafte ID in localStorage.
  function resolveDeviceId() {
    try {
      var fromUrl = new URLSearchParams(window.location.search).get("device");
      if (fromUrl) return fromUrl;
    } catch (e) {}
    var k = "bts-monitor-device-id";
    var id = "";
    try { id = localStorage.getItem(k) || ""; } catch (e) {}
    if (!id) {
      id = (window.crypto && crypto.randomUUID)
        ? crypto.randomUUID()
        : (Date.now().toString(16) + Math.random().toString(16).slice(2));
      try { localStorage.setItem(k, id); } catch (e) {}
    }
    return id;
  }
  var DEVICE_ID = MODE === "device" ? resolveDeviceId() : "";

  // Adresse der State-Abfrage: Geräte-Modus fragt mit der Geräte-ID,
  // der feste Modus leitet sie aus dem eigenen Pfad ab (…/display → …/state).
  var STATE_URL = MODE === "device"
    ? BASE + "monitor/state?device=" + encodeURIComponent(DEVICE_ID)
    : window.location.pathname.replace(/\/display\/?$/, "/state");

  var DISCIPLINE_DE = {
    mens_singles: "Herreneinzel",
    womens_singles: "Dameneinzel",
    mens_doubles: "Herrendoppel",
    womens_doubles: "Damendoppel",
    mixed: "Mixed"
  };

  var els = {
    root: document.getElementById("root"),
    adView: document.getElementById("ad-view"),
    adImg: document.getElementById("ad-img"),
    adFallback: document.getElementById("ad-fallback"),
    fallbackTn: document.getElementById("fallback-tn"),
    matchView: document.getElementById("match-view"),
    courtLabel: document.getElementById("court-label"),
    discipline: document.getElementById("discipline"),
    matchClock: document.getElementById("match-clock"),
    callTimer: document.getElementById("call-timer"),
    half1: document.getElementById("half1"),
    half2: document.getElementById("half2"),
    footer: document.getElementById("footer"),
    timerOverlay: document.getElementById("timer-overlay"),
    timerLabel: document.getElementById("timer-label"),
    timerFlaps: document.getElementById("timer-flaps"),
    pairingView: document.getElementById("pairing-view"),
    identifyOverlay: document.getElementById("identify-overlay"),
    identifyCode: document.getElementById("identify-code"),
    identifyCourt: document.getElementById("identify-court"),
    offline: document.getElementById("offline")
  };

  // ─── Werbe-Rotation ──────────────────────────────────────────────────
  var adState = { urls: [], idx: 0, intervalS: 10, timer: null, key: "" };

  // Asset-URLs werden absolut aus BASE gebaut – unabhängig von der
  // Verschachtelungstiefe der Seite (LAN vs. Cloud-Namespace).
  function adUrl(id) { return BASE + "ads/" + encodeURIComponent(id); }

  function applyAds(adIds, intervalS) {
    var key = adIds.join("|") + "@" + intervalS;
    if (key === adState.key) return; // unverändert – Rotation nicht stören
    adState.key = key;
    adState.urls = adIds.map(adUrl);
    adState.intervalS = intervalS > 0 ? intervalS : 10;
    adState.idx = 0;
    if (adState.timer) { clearInterval(adState.timer); adState.timer = null; }
    if (adState.urls.length > 1) {
      adState.timer = setInterval(rotateAd, adState.intervalS * 1000);
    }
    renderAd();
  }

  function rotateAd() {
    if (adState.urls.length === 0) return;
    adState.idx = (adState.idx + 1) % adState.urls.length;
    renderAd();
  }

  function renderAd() {
    if (adState.urls.length > 0) {
      els.adImg.src = adState.urls[adState.idx];
      els.adImg.style.display = "";
      els.adFallback.classList.remove("show");
    } else {
      els.adImg.style.display = "none";
      els.adImg.removeAttribute("src");
      els.adFallback.classList.add("show");
    }
  }

  // ─── Helfer ──────────────────────────────────────────────────────────
  // Parst den vom Tablet gespiegelten courtState (JSON-String) zu einem
  // Objekt – oder null, wenn keiner vorliegt oder er beschädigt ist.
  function parseCourtState(json) {
    if (!json) return null;
    try { return JSON.parse(json); } catch (e) { return null; }
  }

  // Zerlegt einen Namen in Vorname(n) + Nachname. Der letzte Namensteil
  // ist der Nachname, alles davor der Vorname. Ein einteiliger Name hat
  // keinen Vornamen (given = ""), ein leerer Name fällt auf „—" zurück.
  function splitName(full) {
    var parts = (full || "").trim().split(/\s+/).filter(Boolean);
    if (parts.length === 0) return { given: "", family: "—" };
    if (parts.length === 1) return { given: "", family: parts[0] };
    return {
      given: parts.slice(0, -1).join(" "),
      family: parts[parts.length - 1],
    };
  }

  function flagEl(nat) {
    var img = document.createElement("img");
    img.className = "flag";
    var code = (nat || "").trim().toUpperCase();
    if (code) {
      img.src = BASE + "flags/" + encodeURIComponent(code) + ".svg";
      img.onerror = function () { img.classList.add("hidden"); };
    } else {
      img.classList.add("hidden");
    }
    return img;
  }

  // Baut eine Bildschirmhälfte für ein Team. `players` = [{name,nationality}],
  // `done` = abgeschlossene Sätze als [{v,won}], `current` = laufender
  // Satzwert (oder null, wenn das Match feststeht), `serving` = schlägt
  // dieses Team auf?, `isWinner` = dieses Team hat das Match gewonnen.
  // `servePlayerIdx` = Index des konkret aufschlagenden Spielers im Team
  // (BWF-Doppelregel); null → Team-Level-Fallback (Punkt beim ersten Namen).
  function renderHalf(host, players, done, current, serving, isWinner, servePlayerIdx) {
    host.textContent = "";
    host.classList.toggle("serving", !!serving);
    host.classList.toggle("winner", !!isWinner);
    var pBox = document.createElement("div");
    pBox.className = "players" + (players.length > 1 ? " doubles" : "");
    players.forEach(function (p, i) {
      var row = document.createElement("div");
      row.className = "player";

      // Reihenfolge wie auf der Kombi-Anzeige: Aufschlag-Punkt → Flagge →
      // Name. Der Punkt sitzt nur beim konkret aufschlagenden Spieler. Im
      // Doppel mit Spieler-Info beim richtigen Namen, sonst (Einzel oder
      // altes Tablet ohne Info) beim ersten Spieler des aufschlagenden Teams.
      var dotHere = serving &&
        (servePlayerIdx == null ? i === 0 : i === servePlayerIdx);
      var dot = document.createElement("span");
      dot.className = "serve-dot" + (dotHere ? " on" : "");
      dot.textContent = "●";
      row.appendChild(dot);
      row.appendChild(flagEl(p.nationality));

      // Name im Broadcast-Stil: Vorname klein, Nachname groß. Trägt der
      // Spieler die getrennten BTP-Felder (family nicht leer), werden sie
      // direkt verwendet – das ist 100 % korrekt auch bei mehrteiligen
      // Nachnamen wie „van der Berg". Ältere Wire-Daten ohne die Felder
      // fallen auf das Zerlegen von `name` zurück.
      var parts = (p.family && p.family.length > 0)
        ? { given: p.given || "", family: p.family }
        : splitName(p.name);
      var name = document.createElement("span");
      name.className = "name";
      var given = document.createElement("span");
      given.className = "given";
      given.textContent = parts.given;
      var family = document.createElement("span");
      family.className = "family";
      family.textContent = parts.family;
      name.appendChild(given);
      name.appendChild(family);
      row.appendChild(name);
      pBox.appendChild(row);
    });
    host.appendChild(pBox);

    var scores = document.createElement("div");
    // `current === null` → Match steht fest: Endergebnis größer setzen.
    scores.className = "scores" + (current === null ? " decided" : "");
    var doneBox = document.createElement("div");
    doneBox.className = "sets-done";
    done.forEach(function (s) {
      var d = document.createElement("div");
      d.className = "set-done" + (s.won ? " won" : "");
      d.textContent = String(s.v);
      doneBox.appendChild(d);
    });
    scores.appendChild(doneBox);
    // Laufender Satz nur, solange das Match nicht entschieden ist.
    if (current !== null) {
      var cur = document.createElement("div");
      cur.className = "set-current" + (serving ? " serving" : "");
      cur.textContent = String(current);
      scores.appendChild(cur);
    }
    // Steht der Sieger fest, eine klare Markierung an der Gewinner-Hälfte.
    if (isWinner) {
      var mark = document.createElement("div");
      mark.className = "winner-mark";
      mark.textContent = "🏆";
      scores.appendChild(mark);
    }
    host.appendChild(scores);
  }

  // ─── Match-Ansicht ───────────────────────────────────────────────────
  // Aufruf-Timer: hochzählende Uhr seit dem 1. Aufruf (Spiel kam aufs Feld)
  // plus Ampel-Chip „1. Aufruf → 2. Aufruf → Letzter Aufruf". Rechnet relativ
  // zur Server-Zeit (Pi-Uhr oft nicht synchron). Leer, wenn aus/kein Spiel.
  function renderCallTimer(state) {
    var el = els.callTimer;
    if (!el) return;
    var ct = state.callTimer || {};
    if (!ct.enabled || !state.match ||
        typeof state.onCourtSinceMs !== "number" || state.onCourtSinceMs <= 0) {
      el.textContent = "";
      el.className = "call-timer";
      return;
    }
    var now = (typeof state.serverNowMs === "number" && state.serverNowMs > 0)
      ? state.serverNowMs : Date.now();
    var sec = Math.max(0, Math.floor((now - state.onCourtSinceMs) / 1000));
    var clock = Math.floor(sec / 60) + ":" + ("0" + (sec % 60)).slice(-2);
    var min = sec / 60;
    var label = "1. Aufruf", tone = "ok";
    var third = ct.thirdCallMinutes, second = ct.secondCallMinutes;
    if (typeof third === "number" && third > 0 && min >= third) {
      label = "Letzter Aufruf"; tone = "due";
    } else if (typeof second === "number" && second > 0 && min >= second) {
      label = "2. Aufruf"; tone = "warn";
    }
    el.textContent = "📢 " + clock + " · " + label;
    el.className = "call-timer " + tone;
  }

  function renderMatch(state) {
    var m = state.match;
    var cfg = state.config || {};
    var cs = parseCourtState(state.courtState);

    els.courtLabel.textContent = state.courtLabel || COURT_LABEL;

    // Spieldauer in der Kopfzeile (Stoppuhr + Minuten), wenn aktiviert und
    // der Tablet-Zustand einen Spielbeginn kennt. Ohne zaehlendes Tablet
    // bleibt das Element leer und wird per CSS ausgeblendet.
    els.matchClock.textContent = "";
    if (cfg.showMatchClock !== false && cs &&
        typeof cs.startedAt === "number" && cs.startedAt > 0) {
      // Wie beim Pausen-Countdown: relativ zur Server-Zeit rechnen, damit
      // die Pi-Uhr (oft nicht synchron) die Spieldauer nicht verfaelscht.
      var nowClock = (typeof state.serverNowMs === "number" && state.serverNowMs > 0)
        ? state.serverNowMs
        : Date.now();
      var mins = Math.max(0, Math.floor((nowClock - cs.startedAt) / 60000));
      els.matchClock.textContent = "⏱ " + mins + " min";
    }

    renderCallTimer(state);

    var discKey = m.discipline || "";
    els.discipline.textContent =
      cfg.showDiscipline !== false ? (DISCIPLINE_DE[discKey] || "") : "";

    // Satzstand aufteilen. Steht das Match fest (das Tablet meldet
    // `finished`), gibt es keinen laufenden Satz mehr: alle gespielten
    // Sätze sind „fertig", ein etwaiger leerer 0:0-Geistersatz am Ende
    // fällt weg, und der Sieger wird hervorgehoben.
    var rawSets = Array.isArray(m.sets) ? m.sets : [];
    var decided = !!(cs && cs.finished);
    var winnerTeam = null;
    var current, doneSets;
    if (decided) {
      var played = rawSets.slice();
      while (played.length > 0) {
        var ls = played[played.length - 1];
        if ((ls.a || 0) === 0 && (ls.b || 0) === 0) { played.pop(); }
        else { break; }
      }
      doneSets = played;
      current = null;
      winnerTeam = matchWinner(cs, played);
    } else {
      current = rawSets.length > 0 ? rawSets[rawSets.length - 1] : { a: 0, b: 0 };
      doneSets = rawSets.slice(0, Math.max(0, rawSets.length - 1));
    }
    // Pro abgeschlossenem Satz den Sieger hell (weiß) hervorheben – wie auf
    // der Kombi-Anzeige, auch während des laufenden Spiels (die `doneSets`
    // sind dann bereits beendete Sätze; der laufende Satz ist `current` und
    // nicht dabei). Ausnahme: bei einer Aufgabe ist der letzte Satz
    // unvollständig, eine Hervorhebung nach Punktzahl wäre dort irreführend.
    // Der Match-Sieger selbst (🏆 + Hälfte) bleibt auch bei Aufgabe korrekt.
    var highlightSets = !(cs && cs.retired);
    var done1 = doneSets.map(function (s) {
      return { v: s.a, won: highlightSets && (s.a || 0) > (s.b || 0) };
    });
    var done2 = doneSets.map(function (s) {
      return { v: s.b, won: highlightSets && (s.b || 0) > (s.a || 0) };
    });

    // Aufschlag aus dem gespiegelten Tablet-Zustand – nur im laufenden Spiel.
    // Spieler-genau (BWF-Doppelregel), wenn das Tablet die Info liefert.
    var serveInfo = decided ? null : servingInfo(cs);
    var serving = serveInfo ? serveInfo.team : null;
    var servePlayerIdx = serveInfo ? serveInfo.playerIdx : null;

    renderHalf(els.half1, m.team1 || [], done1,
               current ? current.a : null, serving === 1, winnerTeam === 1,
               serving === 1 ? servePlayerIdx : null);
    renderHalf(els.half2, m.team2 || [], done2,
               current ? current.b : null, serving === 2, winnerTeam === 2,
               serving === 2 ? servePlayerIdx : null);

    // Fußzeile: Runde + Spielnummer (je nach Konfiguration).
    els.footer.textContent = "";
    var parts = [];
    if (cfg.showRound !== false && m.eventLabel) parts.push(m.eventLabel);
    if (cfg.showMatchNumber !== false && m.matchNumber) {
      parts.push("Spiel " + m.matchNumber);
    }
    parts.forEach(function (txt, i) {
      if (i > 0) {
        var sep = document.createElement("span");
        sep.className = "dot-sep";
        sep.textContent = "·";
        els.footer.appendChild(sep);
      }
      var span = document.createElement("span");
      span.textContent = txt;
      els.footer.appendChild(span);
    });
  }

  // Liefert 1 (Team 1), 2 (Team 2) oder null aus dem geparsten courtState.
  function servingTeam(cs) {
    if (!cs || !cs.servingSide || !cs.teamOnSide) return null;
    return cs.teamOnSide.a === cs.servingSide ? 1 : 2;
  }

  // Spieler-genauer Aufschlag: { team:1|2, playerIdx:0|1|null } oder null.
  // Bevorzugt das vom Tablet berechnete `serving:{team,index}` (BWF-
  // Doppelregel, kennt Positionen + Spieler-IDs); fällt sonst auf die
  // Team-Ableitung zurück (Punkt beim ersten Spieler). Spiegelt die
  // Server-Logik in state.rs (overview()).
  function servingInfo(cs) {
    if (!cs) return null;
    if (cs.serving && cs.serving.team) {
      var team = cs.serving.team === "a" ? 1 : 2;
      var idx = (typeof cs.serving.index === "number") ? cs.serving.index : null;
      return { team: team, playerIdx: idx };
    }
    var t = servingTeam(cs);
    return t == null ? null : { team: t, playerIdx: null };
  }

  // Sieger-Team (1 oder 2) eines feststehenden Matches, sonst null. Bei
  // Aufgabe steht der Sieger im gespiegelten Tablet-Zustand; sonst zählt,
  // wer mehr Sätze gewonnen hat.
  function matchWinner(cs, sets) {
    if (cs && cs.retired) {
      return cs.retiredWinner === "a" ? 1
           : cs.retiredWinner === "b" ? 2 : null;
    }
    var w1 = 0, w2 = 0;
    sets.forEach(function (s) {
      if ((s.a || 0) > (s.b || 0)) w1++;
      else if ((s.b || 0) > (s.a || 0)) w2++;
    });
    if (w1 > w2) return 1;
    if (w2 > w1) return 2;
    return null;
  }

  // ─── Retro-Pausen-Timer ──────────────────────────────────────────────
  var PAUSE_LABEL = { eleven: "Pause", game: "Satzpause", injury: "Behandlung" };
  var lastFlapText = "";

  function renderTimer(state) {
    var cfg = state.config || {};
    if (cfg.showTimer === false) { hideTimer(); return; }
    var cs = parseCourtState(state.courtState);
    var pause = cs && cs.pause;
    if (!pause) { hideTimer(); return; }

    els.timerOverlay.classList.add("show");
    els.timerLabel.textContent = PAUSE_LABEL[pause.kind] || "Pause";
    var text;
    if (typeof pause.endsAt === "number") {
      // `endsAt` ist mit der Uhr des zaehlenden Tablets gesetzt. Der Pi
      // (TV) hat oft keine synchrone Uhr → `Date.now()` weicht ab und der
      // Countdown ist um den Drift verschoben (z.B. +1 min). Wir rechnen
      // daher relativ zur Server-Zeit aus dem Poll (state.serverNowMs),
      // sofern vorhanden — sonst Fallback auf die lokale Uhr.
      var nowMs = (typeof state.serverNowMs === "number" && state.serverNowMs > 0)
        ? state.serverNowMs
        : Date.now();
      var secs = Math.max(0, Math.round((pause.endsAt - nowMs) / 1000));
      var mm = Math.floor(secs / 60);
      var ss = secs % 60;
      text = mm + ":" + (ss < 10 ? "0" + ss : ss);
    } else {
      // Behandlungspause ohne Countdown.
      text = "——";
    }
    renderFlaps(text);
  }

  function hideTimer() {
    els.timerOverlay.classList.remove("show");
    lastFlapText = "";
  }

  // Zeichnet die Klappanzeige; geänderte Stellen bekommen die Flip-Animation.
  function renderFlaps(text) {
    var rebuild = text.length !== els.timerFlaps.children.length;
    if (rebuild) {
      els.timerFlaps.textContent = "";
      for (var i = 0; i < text.length; i++) {
        var flap = document.createElement("div");
        flap.className = "flap" + (text[i] === ":" ? " colon" : "");
        flap.textContent = text[i];
        els.timerFlaps.appendChild(flap);
      }
    } else {
      for (var j = 0; j < text.length; j++) {
        var el = els.timerFlaps.children[j];
        if (el.textContent !== text[j]) {
          el.textContent = text[j];
          if (text[j] !== ":") {
            el.classList.remove("flip");
            void el.offsetWidth; // Reflow → Animation neu starten
            el.classList.add("flip");
          }
        }
      }
    }
    lastFlapText = text;
  }

  // ─── Fernbefehle (Geräte-Modus) ──────────────────────────────────────
  var lastCmdId = 0;
  try { lastCmdId = parseInt(localStorage.getItem("bts-monitor-cmd-id") || "0", 10) || 0; }
  catch (e) {}
  var cmdBaselineSet = false;
  var identifyTimer = null;

  function saveCmdId() {
    try { localStorage.setItem("bts-monitor-cmd-id", String(lastCmdId)); } catch (e) {}
  }

  // Führt einen Fernbefehl genau einmal aus. Der erste Poll setzt nur die
  // Basis – ein beim Laden bereits offener Befehl wird nicht nachgeholt
  // (auch nach einem „Neu laden" kein Endlos-Reload).
  function handleCommand(cmd) {
    var id = (cmd && typeof cmd.id === "number") ? cmd.id : 0;
    if (!cmdBaselineSet) {
      cmdBaselineSet = true;
      if (id > lastCmdId) { lastCmdId = id; saveCmdId(); }
      return;
    }
    if (!cmd || id <= lastCmdId) return;
    lastCmdId = id;
    saveCmdId();
    if (cmd.kind === "reload") {
      location.reload();
    } else if (cmd.kind === "identify") {
      showIdentify();
    }
  }

  // Blendet Code + Feld groß ein, damit man Gerät und TV zuordnen kann.
  function showIdentify() {
    els.identifyCode.textContent =
      (lastState && lastState.deviceCode) || DEVICE_ID.slice(0, 4).toUpperCase();
    els.identifyCourt.textContent = (lastState && lastState.courtLabel) || "";
    els.identifyOverlay.classList.add("show");
    if (identifyTimer) clearTimeout(identifyTimer);
    identifyTimer = setTimeout(function () {
      els.identifyOverlay.classList.remove("show");
    }, 10000);
  }

  // ─── Poll-Schleife ───────────────────────────────────────────────────
  var lastState = null;

  // Default-Anzeige fuer unzugewiesene Pis: Badhub-Logo Vollbild.
  // Den Device-Code blendet das Identifizieren-Overlay on-demand ein.
  function showPairing(_state) {
    els.pairingView.classList.add("show");
    els.matchView.classList.remove("show");
    els.adView.classList.remove("show");
    hideTimer();
  }

  function applyState(state) {
    lastState = state;
    if (state.courtLabel) {
      COURT_LABEL = state.courtLabel;
      document.title = "Court-Monitor – " + state.courtLabel;
    }
    var cfg = state.config || {};
    els.fallbackTn.textContent = state.tournamentName || "bts-light";

    // Layout am Wurzelelement markieren – Vorbereitung fuer weitere Layouts.
    els.root.dataset.layout = cfg.layout || "split";

    // Info-Monitor-Zuweisung: bts-light schickt redirectTo, wir wechseln
    // sofort auf die zugehoerige Info-HTML. Geraete-Code als Query
    // weiterreichen, damit die Info-Seite die Identitaet kennt.
    //
    // Vor handleCommand pruefen (Code-Review v0.9.19 HIGH): ein anstehender
    // reload-/identify-Command darf nicht auf einer Seite zuenden, die im
    // gleichen Tick wegnavigiert — sonst zerstoert der reload den Wechsel.
    if (state.redirectTo && typeof state.redirectTo === "string"
        && location.pathname !== state.redirectTo) {
      var sep = state.redirectTo.indexOf("?") >= 0 ? "&" : "?";
      location.href = state.redirectTo + sep + "device=" + encodeURIComponent(DEVICE_ID);
      return;
    }

    if (MODE === "device") handleCommand(state.command);

    if (state.unassigned) {
      showPairing(state);
      return;
    }
    els.pairingView.classList.remove("show");

    if (state.match) {
      // Spiel auf dem Feld → Match-Ansicht.
      els.matchView.classList.add("show");
      els.adView.classList.remove("show");
      if (adState.timer) { clearInterval(adState.timer); adState.timer = null; }
      adState.key = "";
      renderMatch(state);
      renderTimer(state);
    } else {
      // Leeres Feld → Werbung. Ist die Werbung abgeschaltet (showAds),
      // bleibt die Liste leer → neutrale Leerlauf-Seite.
      els.adView.classList.add("show");
      els.matchView.classList.remove("show");
      hideTimer();
      var ads = (cfg.showAds !== false && Array.isArray(state.ads))
        ? state.ads : [];
      applyAds(ads, cfg.adIntervalS || 10);
    }
  }

  function poll() {
    fetch(STATE_URL, { cache: "no-store" })
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function (state) {
        els.offline.classList.remove("show");
        applyState(state);
      })
      .catch(function () {
        // Aussetzer tolerieren: letzten Stand halten, nur Hinweis zeigen.
        els.offline.classList.add("show");
      });
  }

  // Pausen-Countdown UND Aufruf-Uhr jede Sekunde unabhängig vom Poll
  // aktualisieren (sonst zählte die Uhr nur im 1-s-Poll-Takt hoch).
  setInterval(function () {
    if (lastState && lastState.match) {
      renderTimer(lastState);
      renderCallTimer(lastState);
    }
  }, 1000);

  poll();
  setInterval(poll, 1000);
  </script>
</body>
</html>
