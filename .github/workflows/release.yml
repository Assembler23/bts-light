name: Release bauen & veröffentlichen

# Versions-Tags (v0.2.0, v1.0.0 …) lösen einen vollständigen Release aus:
# Build → Signatur → GitHub-Release → Upload nach badhub.de (Auto-Update).
# workflow_dispatch ist nur ein Trockenlauf (baut, veröffentlicht nicht).
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

# Releases strikt serialisieren: nie zwei Builds/Publishes gleichzeitig.
# Sonst rsyncen mehrere publish-Jobs parallel ins selbe Verzeichnis auf
# badhub.de und hinterlassen eine inkonsistente latest.json (Version aus
# Build A, URL/Signatur aus Build B → Updater lädt die falsche Datei und
# bleibt in einer Update-Schleife auf der alten Version hängen).
# cancel-in-progress: false → laufende Releases NICHT abbrechen, sauber
# nacheinander abarbeiten.
concurrency:
  group: bts-light-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # nötig, um das GitHub-Release anzulegen
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: .
          cache-on-failure: true

      - name: Frontend-Abhängigkeiten installieren
        run: npm ci

      # createUpdaterArtifacts (tauri.conf.json) erzeugt zusätzlich das
      # signierte *-setup.nsis.zip + .sig. Ohne die Signing-Secrets schlägt
      # der Build fehl – sie müssen im Repo gesetzt sein.
      - name: App + Installer bauen (signiert)
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # GitHub-Release dient als Changelog/Backup UND als Transportmedium
      # für den Linux-Publish-Job (kein upload-artifact → keine Quota).
      - name: GitHub-Release anlegen
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: BTS Light ${{ github.ref_name }}
          body: >
            Automatischer Release. Auto-Update bezieht diese Version über
            badhub.de/download/bts-light/.
          fail_on_unmatched_files: true
          # Cargo-Workspace: das Build-Verzeichnis liegt im Repo-Root
          # (target/), nicht mehr unter src-tauri/.
          files: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*-setup.exe
            target/release/bundle/nsis/*-setup.exe.sig

  # Lädt die Release-Assets, baut latest.json und schiebt alles nach
  # badhub.de. Läuft auf Linux, weil rsync/ssh dort problemlos verfügbar
  # sind (Windows-Runner haben kein rsync).
  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Release-Assets holen
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p rel
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" --dir rel
          ls -la rel

      # Tauri-2-Updater-Manifest. signature = Inhalt der .sig-Datei,
      # url = die badhub.de-Adresse des NSIS-Installers (-setup.exe) – das
      # ist unter Windows zugleich das Updater-Artefakt.
      - name: latest.json erzeugen
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          SETUP=$(cd rel && ls *-setup.exe | head -1)
          SIG=$(cat "rel/${SETUP}.sig")
          jq -n \
            --arg version "$VERSION" \
            --arg sig "$SIG" \
            --arg url "https://badhub.de/download/bts-light/${SETUP}" \
            --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{version: $version,
              notes: ("BTS Light " + $version),
              pub_date: $date,
              platforms: {"windows-x86_64": {signature: $sig, url: $url}}}' \
            > rel/latest.json
          cat rel/latest.json

      - name: SSH einrichten
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      # latest.json trägt die Signatur bereits inline – die separate
      # .sig-Datei wird vom Updater nicht abgefragt und nicht hochgeladen.
      #
      # Zusätzlich wird der Installer unter dem FESTEN Namen
      # `BTS.Light-setup.exe` abgelegt → stabiler Download-Link
      # https://badhub.de/download/bts-light/BTS.Light-setup.exe, der bei
      # jedem Release automatisch auf die neueste Version zeigt (für
      # Aushänge, QR-Codes, Mails an Vereine). Die Kopie entsteht erst NACH
      # dem latest.json-Schritt, damit dessen `ls *-setup.exe | head -1`
      # weiterhin nur den versionierten Installer sieht.
      - name: Nach badhub.de hochladen
        run: |
          set -euo pipefail
          SETUP=$(cd rel && ls *_*-setup.exe | head -1)
          cp "rel/${SETUP}" "rel/BTS.Light-setup.exe"
          rsync -av \
            rel/latest.json \
            rel/*-setup.exe \
            badhub@178.104.221.177:/var/www/badhub/public/download/bts-light/
