name: Windows-Installer bauen

# Manuell auslösbar (Actions-Tab → "Run workflow") und bei Versions-Tags.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # nötig, um das Release anzulegen
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install frontend dependencies
        run: npm ci

      - name: Build app + installer
        run: npm run tauri build

      # Release-Assets statt Build-Artefakte – sie zählen nicht zur
      # Actions-Artefakt-Quota und lassen sich direkt herunterladen.
      - name: Publish to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-build
          name: BTS Light – Entwicklungs-Build
          body: >
            Unsignierter Test-Build. Beim Start zeigt Windows „Windows hat
            Ihren PC geschützt" – über „Weitere Informationen → Trotzdem
            ausführen" bestätigen.
          prerelease: true
          fail_on_unmatched_files: true
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
