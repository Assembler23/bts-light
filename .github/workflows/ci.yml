name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    # windows-latest = Zielplattform; WebView2 ist vorinstalliert, keine extra system-deps.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # Cargo-Workspace: src-tauri (App) + relay + relay-proto.
      - name: Rust format check
        run: cargo fmt --check

      - name: Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Rust tests
        run: cargo test --workspace
