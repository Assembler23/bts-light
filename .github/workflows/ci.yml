name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    # windows-latest = Zielplattform; WebView2 ist vorinstalliert, keine extra system-deps.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # BWF-Aufschlag-Positionierung des Tablets (Plan 12b) — reiner
      # Node-Test der sicherheitskritischen Positionslogik.
      - name: Tablet-Aufschlagpositionen (JS)
        run: node scripts/test-serving.mjs

      # Gong-Auflöse-Timing (Plan 15) — onended-/Fallback-Pfad + done-Guard
      # der geteilten gongTiming.mjs (kein Überlappen der ersten Silbe).
      - name: Gong-Timing (JS)
        run: node scripts/test-gong-timing.mjs

      # Satz-/Matchball-Erkennung der Felderübersicht (Plan 16).
      - name: Satz-/Matchball (JS)
        run: node scripts/test-gamepoint.mjs

      # Cargo-Workspace: src-tauri (App) + relay + relay-proto.
      - name: Rust format check
        run: cargo fmt --check

      - name: Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Rust tests
        run: cargo test --workspace
